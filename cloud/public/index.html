<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-team-init — Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e0e6f0; min-height: 100vh; }

    .hero { text-align: center; padding: 60px 20px 40px; }
    .hero h1 { font-size: 2.5em; font-weight: 700; margin-bottom: 8px; }
    .hero h1 span { color: #19d3c5; }
    .hero p { color: #8892a4; font-size: 1.1em; }

    .login-form { max-width: 400px; margin: 0 auto 40px; display: flex; gap: 8px; padding: 0 20px; }
    .login-form input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #1e2a3a; background: #111827; color: #e0e6f0; font-size: 14px; }
    .login-form button { padding: 12px 24px; border-radius: 8px; border: none; background: #19d3c5; color: #0a0e17; font-weight: 600; cursor: pointer; font-size: 14px; }
    .login-form button:hover { background: #14b8ad; }

    .dashboard { display: none; max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat { background: #111827; border: 1px solid #1e2a3a; border-radius: 12px; padding: 24px; }
    .stat .label { color: #8892a4; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat .value { font-size: 2em; font-weight: 700; }
    .stat .value.green { color: #19d3c5; }
    .stat .value.yellow { color: #f59e0b; }
    .stat .sub { color: #8892a4; font-size: 13px; margin-top: 4px; }

    .section { background: #111827; border: 1px solid #1e2a3a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .section h2 { font-size: 1.1em; margin-bottom: 16px; color: #e0e6f0; }

    .agents { display: flex; gap: 8px; flex-wrap: wrap; }
    .agent-badge { padding: 6px 14px; border-radius: 20px; background: #1a2332; border: 1px solid #19d3c5; color: #19d3c5; font-size: 13px; font-weight: 500; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #8892a4; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid #1e2a3a; }
    td { padding: 10px 12px; border-bottom: 1px solid #111827; font-size: 14px; }
    td.mono { font-family: 'SF Mono', monospace; font-size: 13px; color: #8892a4; }
    td.green { color: #19d3c5; font-weight: 600; }

    .plan-banner { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #1a2332, #111827); border: 1px solid #1e2a3a; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
    .plan-banner .plan-name { font-size: 1.2em; font-weight: 600; }
    .plan-banner .plan-name span { color: #19d3c5; }
    .plan-banner button { padding: 10px 20px; border-radius: 8px; border: none; background: #19d3c5; color: #0a0e17; font-weight: 600; cursor: pointer; }
    .plan-banner button:hover { background: #14b8ad; }
    .plan-banner button.manage { background: transparent; border: 1px solid #19d3c5; color: #19d3c5; }

    .refresh { color: #8892a4; font-size: 12px; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>claude-team-<span>init</span></h1>
    <p>Agent team savings dashboard</p>
  </div>

  <div class="login-form" id="loginForm">
    <input type="text" id="apiKeyInput" placeholder="Paste your API key (ctk_...)" />
    <button onclick="login()">View Dashboard</button>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="plan-banner" id="planBanner">
      <div>
        <div class="plan-name">Plan: <span id="planName">free</span></div>
        <div style="color: #8892a4; font-size: 13px; margin-top: 4px;" id="planUsage"></div>
      </div>
      <button id="planBtn" onclick="handlePlanAction()">Upgrade to Pro — $9/mo</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">Tokens Saved</div>
        <div class="value green" id="tokensSaved">0</div>
        <div class="sub" id="costSaved">$0.00 estimated</div>
      </div>
      <div class="stat">
        <div class="label">Cache Reads</div>
        <div class="value" id="totalReads">0</div>
        <div class="sub" id="hitRate">0% hit rate</div>
      </div>
      <div class="stat">
        <div class="label">Active Agents</div>
        <div class="value yellow" id="agentCount">0</div>
        <div class="sub" id="cacheEntries">0 cache entries</div>
      </div>
    </div>

    <div class="section" id="agentsSection" style="display:none;">
      <h2>Active Agents</h2>
      <div class="agents" id="agentsList"></div>
    </div>

    <div class="section">
      <h2>Top Token Savers</h2>
      <table>
        <thead>
          <tr>
            <th>Cache Key</th>
            <th>Original</th>
            <th>Cached</th>
            <th>Reads</th>
            <th>Tokens Saved</th>
          </tr>
        </thead>
        <tbody id="topSavers"></tbody>
      </table>
    </div>

    <div class="refresh">Auto-refreshes every 30 seconds</div>
  </div>

  <script>
    let API_KEY = localStorage.getItem('ctk_api_key') || '';
    let BASE = window.location.origin;

    if (API_KEY) login(true);

    function login(auto) {
      if (!auto) {
        API_KEY = document.getElementById('apiKeyInput').value.trim();
        if (!API_KEY) return;
        localStorage.setItem('ctk_api_key', API_KEY);
      }
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      fetchDashboard();
      setInterval(fetchDashboard, 30000);
    }

    async function fetchDashboard() {
      try {
        const res = await fetch(`${BASE}/api/dashboard/data`, {
          headers: { 'Authorization': `Bearer ${API_KEY}` }
        });
        if (!res.ok) {
          if (res.status === 401) {
            localStorage.removeItem('ctk_api_key');
            location.reload();
          }
          return;
        }
        const data = await res.json();
        render(data);
      } catch (e) {
        console.error('Dashboard fetch failed:', e);
      }
    }

    function render(data) {
      // Plan
      document.getElementById('planName').textContent = data.account.plan;
      document.getElementById('planUsage').textContent =
        `${data.cache.entries_count} / ${data.cache.max_entries} cache keys used`;

      const btn = document.getElementById('planBtn');
      if (data.account.plan === 'free') {
        btn.textContent = 'Upgrade to Pro — $9/mo';
        btn.className = '';
      } else {
        btn.textContent = 'Manage Subscription';
        btn.className = 'manage';
      }

      // Stats
      document.getElementById('tokensSaved').textContent = formatNumber(data.savings.total_tokens_saved);
      document.getElementById('costSaved').textContent = `${data.savings.estimated_cost_saved} estimated savings`;
      document.getElementById('totalReads').textContent = formatNumber(data.savings.total_reads);
      document.getElementById('hitRate').textContent = `${data.savings.cache_hit_rate} hit rate`;
      document.getElementById('agentCount').textContent = data.agents.count;
      document.getElementById('cacheEntries').textContent = `${data.cache.entries_count} cache entries`;

      // Agents
      if (data.agents.active.length > 0) {
        document.getElementById('agentsSection').style.display = 'block';
        document.getElementById('agentsList').innerHTML =
          data.agents.active.map(a => `<div class="agent-badge">${a}</div>`).join('');
      }

      // Top savers table
      const tbody = document.getElementById('topSavers');
      tbody.innerHTML = data.cache.top_savers.map(e => `
        <tr>
          <td class="mono">${e.key}</td>
          <td class="mono">${formatBytes(e.original_bytes)}</td>
          <td class="mono">${formatBytes(e.value_bytes)}</td>
          <td>${e.read_count}</td>
          <td class="green">${formatNumber(e.tokens_saved)}</td>
        </tr>
      `).join('');
    }

    function formatNumber(n) {
      if (!n) return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    function formatBytes(b) {
      if (!b) return '-';
      if (b >= 1048576) return (b / 1048576).toFixed(1) + ' MB';
      if (b >= 1024) return (b / 1024).toFixed(1) + ' KB';
      return b + ' B';
    }

    async function handlePlanAction() {
      const plan = document.getElementById('planName').textContent;
      const endpoint = plan === 'free' ? '/api/billing/checkout' : '/api/billing/portal';
      const body = plan === 'free' ? JSON.stringify({ plan: 'pro' }) : '{}';

      try {
        const res = await fetch(`${BASE}${endpoint}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
          },
          body,
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
        else alert(data.error || 'Something went wrong');
      } catch (e) {
        alert('Failed to connect. Is the server running?');
      }
    }
  </script>
</body>
</html>
